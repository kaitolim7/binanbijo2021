    <text id="_鹿大生の美男美女が見たい_そういう声を機に始めた美男美女SNAP_毎年少しずつ形を変えながら鹿児島大学の美男美女を紹介してきました_2016年に始まった美男美女SNAPも今年で6年目を迎えます_わたしたちKADAI_INFOは_鹿児島大学をもっと面白くすることを目的に_おもしろい鹿大生を輩出する_をミッションとして活動してきました_おもしろいってなんだ_人によって違うかもしれない_でも外交的だろうと_内向的だろうとメインカルチャーだろうと_サブカルチャーだろうと計画的だろうと_衝" data-name="「鹿大生の美男美女が見たい」
そういう声を機に始めた美男美女SNAP。

毎年少しずつ形を変えながら鹿児島大学の美男美女を紹介してきました。

2016年に始まった美男美女SNAPも今年で6年目を迎えます。

わたしたちKADAI INFOは、鹿児島大学をもっと面白くすることを目的に、「おもしろい鹿大生を輩出する。」をミッションとして活動してきました。

 おもしろいってなんだ。
人によって違うかもしれない。でも外交的だろうと、内向的だろうとメインカルチャーだろうと、サブカルチャーだろうと計画的だろうと、衝" transform="translate(28 281)" fill="#250b0d" font-size="10" font-family="HiraginoSans-W3, Hiragino Sans"><tspan x="0" y="11">「鹿大生の美男美女が見たい」</tspan><tspan y="11" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan x="0" y="30">そういう声を機に始めた美男美女</tspan><tspan y="30" font-family="NotoSans-Regular, Noto Sans">SNAP</tspan><tspan y="30">。</tspan><tspan y="30" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="49"></tspan></tspan><tspan x="0" y="61">毎年少しずつ形を変えながら鹿児島大学の美男美女を紹介してきまし</tspan><tspan x="0" y="80">た。</tspan><tspan y="80" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="99"></tspan><tspan x="0" y="113">2016</tspan><tspan y="113" font-family="HiraginoSans-W3, Hiragino Sans">年に始まった美男美女</tspan><tspan y="113">SNAP</tspan><tspan y="113" font-family="HiraginoSans-W3, Hiragino Sans">も今年で</tspan><tspan y="113">6</tspan><tspan y="113" font-family="HiraginoSans-W3, Hiragino Sans">年目を迎えます。</tspan><tspan y="113"></tspan><tspan x="0" y="132"></tspan></tspan><tspan x="0" y="146">わたしたち</tspan><tspan y="146" font-family="NotoSans-Regular, Noto Sans">KADAI INFO</tspan><tspan y="146">は、鹿児島大学をもっと面白くすることを目的</tspan><tspan x="0" y="163">に、「おもしろい鹿大生を輩出する。」をミッションとして活動してき</tspan><tspan x="0" y="182">ました。</tspan><tspan y="182" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="201"></tspan><tspan x="0" y="215"> </tspan><tspan y="215" font-family="HiraginoSans-W3, Hiragino Sans">おもしろいってなんだ。</tspan><tspan y="215"></tspan></tspan><tspan x="0" y="232">人によって違うかもしれない。でも外交的だろうと、内向的だろうとメ</tspan><tspan x="0" y="249">インカルチャーだろうと、サブカルチャーだろうと計画的だろうと、衝</tspan><tspan x="0" y="268">動的だろうと、自分の個性を最大限に輝かせている人は、</tspan><tspan y="268" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="287"></tspan></tspan><tspan x="0" y="301">きっとおもしろい＿＿＿＿。</tspan><tspan y="301" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="320"></tspan><tspan x="0" y="334"> </tspan><tspan y="334" font-family="HiraginoSans-W3, Hiragino Sans">そして、</tspan><tspan y="334">”</tspan><tspan y="334" font-family="HiraginoSans-W3, Hiragino Sans">美しい</tspan><tspan y="334">”</tspan><tspan y="334" font-family="HiraginoSans-W3, Hiragino Sans">もきっと個性のひとつ、</tspan><tspan y="334">”</tspan><tspan y="334" font-family="HiraginoSans-W3, Hiragino Sans">美しい</tspan><tspan y="334">”</tspan><tspan y="334" font-family="HiraginoSans-W3, Hiragino Sans">もきっとおもしろ</tspan><tspan x="0" y="353" font-family="HiraginoSans-W3, Hiragino Sans">い。</tspan><tspan y="353"></tspan><tspan x="0" y="372"></tspan></tspan><tspan x="0" y="386">そのようなおもしろい鹿大生を輩出したい。</tspan><tspan y="386" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan x="0" y="405">そして頑張っている鹿大生を応援したい。</tspan><tspan y="405" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="424"></tspan></tspan><tspan x="0" y="438">そんな想いで今年も「美男美女</tspan><tspan y="438" font-family="NotoSans-Regular, Noto Sans">SNAP2021</tspan><tspan y="438">」を開催します。</tspan><tspan y="438" font-family="NotoSans-Regular, Noto Sans"></tspan><tspan font-family="NotoSans-Regular, Noto Sans"><tspan x="0" y="457"></tspan></tspan></text>
  </g>
